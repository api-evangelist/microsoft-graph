specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Microsoft Graph
providerId: microsoft-graph
publisherName: Microsoft Corporation
serviceCategory: Productivity / Identity API
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Microsoft 365
  - Identity
  - Microsoft Graph
  - Microsoft
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Microsoft Graph: API access is bundled with the underlying Microsoft
  365 / Office 365 / Entra / Intune / Dynamics seat licences with no per-call charge. Microsoft Graph
  Data Connect (bulk extraction) is metered separately under Azure consumption.'
sources:
  - https://learn.microsoft.com/en-us/graph/
  - https://learn.microsoft.com/en-us/graph/data-connect-concept-overview
billingModel:
  pricingCategory: Bundled with Microsoft 365 + Pay-As-You-Go (Data Connect)
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Microsoft Graph
  ServiceCategory: Productivity / Identity API
  ProviderName: Microsoft
  PublisherName: Microsoft Corporation
  InvoiceIssuerName: Microsoft Corporation
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: graph_api_requests
    description: Microsoft Graph API calls (no charge; capacity-managed via throttling)
    unit: request
    aggregation: sum
    dimensions:
      - application
      - tenant
      - service
  - name: graph_resource_units
    description: ResourceUnits consumed against the identity / directory service (token-bucket)
    unit: resource_unit
    aggregation: sum
    dimensions:
      - application
      - tenant
  - name: m365_seats
    description: Underlying Microsoft 365 / Office 365 seats that entitle Graph access
    unit: seat
    aggregation: sum
    dimensions:
      - tenant
      - sku
  - name: entra_id_seats
    description: Entra ID seats (Free / P1 / P2) that entitle directory and Conditional Access Graph
      endpoints
    unit: seat
    aggregation: sum
    dimensions:
      - tenant
      - sku
  - name: data_connect_bytes
    description: Bytes extracted via Microsoft Graph Data Connect to Azure Data Lake (billed via Azure
      consumption)
    unit: GB
    aggregation: sum
    dimensions:
      - dataset
      - tenant
principles:
  - name: Visibility
    description: Capture x-ms-throttle-scope, x-ms-throttle-limit-percentage, and request-id from every
      Graph response for usage analytics; correlate with the M365 admin centre seat reports.
  - name: Allocation
    description: Use a per-team Entra app registration so request volume can be attributed to the consuming
      team and chargedback against the parent M365 SKU.
  - name: Optimization
    description: Replace polling with change notifications and delta queries; prefer $batch; move tenant-wide
      analytics to Microsoft Graph Data Connect to avoid REST throttling and reduce per-call overhead.
  - name: Accountability
    description: API platform team owns Graph app registrations, throttling SLOs, and Data Connect cost;
      finance owns the M365 / Entra SKU mix that entitles Graph access.
maintainers:
