}

enum TeamVisibility {
  PRIVATE
  PUBLIC
  HIDDEN_MEMBERSHIP
  UNKNOWN_FUTURE_VALUE
}

enum ComplianceState {
  UNKNOWN
  COMPLIANT
  NON_COMPLIANT
  CONFLICT
  ERROR
  IN_GRACE_PERIOD
