"""
Microsoft Graph GraphQL Schema
Unified endpoint for Microsoft 365, Azure AD, Teams, OneDrive, and more.
Docs: https://learn.microsoft.com/en-us/graph/api/overview
GitHub: https://github.com/microsoftgraph
