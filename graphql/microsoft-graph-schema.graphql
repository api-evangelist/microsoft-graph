# ─── Root Types ───────────────────────────────────────────────────────────────

type Query {
  # Users
  me: User
  user(id: ID!): User
  users(filter: String, search: String, top: Int, skip: Int): [User!]

  # Groups
  group(id: ID!): Group
  groups(filter: String, search: String, top: Int, skip: Int): [Group!]

  # Applications & Service Principals
  application(id: ID!): Application
  applications(filter: String, top: Int, skip: Int): [Application!]
  servicePrincipal(id: ID!): ServicePrincipal
  servicePrincipals(filter: String, top: Int, skip: Int): [ServicePrincipal!]

  # Directory
  directoryObject(id: ID!): DirectoryObject
  organization: Organization
  subscribedSkus: [SubscribedSku!]

  # Drives & Files
  drive(id: ID!): Drive
  driveItem(driveId: ID!, itemId: ID!): DriveItem

  # Teams & Chat
  team(id: ID!): Team
  teams(filter: String, top: Int, skip: Int): [Team!]
  chat(id: ID!): Chat
  chats: [Chat!]
  channel(teamId: ID!, channelId: ID!): Channel
  onlineMeeting(userId: ID!, meetingId: ID!): OnlineMeeting
  callRecord(callId: ID!): CallRecord

  # Security
  alert(id: ID!): Alert
  alerts(filter: String, top: Int, skip: Int): [Alert!]
  signIn(id: ID!): SignIn
  signIns(filter: String, top: Int, skip: Int): [SignIn!]
  riskDetection(id: ID!): RiskDetection
  riskDetections(filter: String, top: Int, skip: Int): [RiskDetection!]
  audit(id: ID!): Audit
  auditLogs(filter: String, top: Int, skip: Int): [Audit!]

  # Search
  search(requests: [SearchRequest!]!): [SearchResult!]

  # Policies
  conditionalAccessPolicies: [ConditionalAccessPolicy!]
  namedLocations: [NamedLocation!]

  # Subscriptions
  subscription(id: ID!): Subscription
  subscriptions: [Subscription!]

  # Devices
  device(id: ID!): Device
  devices(filter: String, top: Int, skip: Int): [Device!]

  # Bookings
  bookingBusiness(id: ID!): BookingBusiness
  bookingBusinesses: [BookingBusiness!]

  # Scheduling
  schedule(teamId: ID!): Schedule
}

type Mutation {
  # Users
  createUser(input: JSON!): User
  updateUser(id: ID!, input: JSON!): User
  deleteUser(id: ID!): Boolean

  # Groups
  createGroup(input: JSON!): Group
  updateGroup(id: ID!, input: JSON!): Group
  deleteGroup(id: ID!): Boolean
  addGroupMember(groupId: ID!, memberId: ID!): Boolean
  removeGroupMember(groupId: ID!, memberId: ID!): Boolean

  # Applications
  createApplication(input: JSON!): Application
  updateApplication(id: ID!, input: JSON!): Application
  deleteApplication(id: ID!): Boolean

  # Teams
  createTeam(input: JSON!): Team
  updateTeam(id: ID!, input: JSON!): Team
  archiveTeam(id: ID!): Boolean
  createChannel(teamId: ID!, input: JSON!): Channel
  sendChannelMessage(teamId: ID!, channelId: ID!, input: JSON!): ChatMessage

  # Chat
  createChat(input: JSON!): Chat
  sendChatMessage(chatId: ID!, input: JSON!): ChatMessage

  # Files
  createDriveItem(driveId: ID!, parentId: ID!, input: JSON!): DriveItem
  updateDriveItem(driveId: ID!, itemId: ID!, input: JSON!): DriveItem
  deleteDriveItem(driveId: ID!, itemId: ID!): Boolean
  createSharingLink(driveId: ID!, itemId: ID!, type: String!, scope: String!): Permission

  # Subscriptions (webhooks)
  createSubscription(input: JSON!): Subscription
  updateSubscription(id: ID!, expirationDateTime: DateTime!): Subscription
  deleteSubscription(id: ID!): Boolean

  # Policies
  createConditionalAccessPolicy(input: JSON!): ConditionalAccessPolicy
  updateConditionalAccessPolicy(id: ID!, input: JSON!): ConditionalAccessPolicy
  deleteConditionalAccessPolicy(id: ID!): Boolean

  # Bookings
  createBookingBusiness(input: JSON!): BookingBusiness
  createBookingAppointment(businessId: ID!, input: JSON!): BookingAppointment
  cancelBookingAppointment(businessId: ID!, appointmentId: ID!, cancellationMessage: String): Boolean

  # Scheduling
  createShift(teamId: ID!, input: JSON!): Shift
  updateShift(teamId: ID!, shiftId: ID!, input: JSON!): Shift
  deleteShift(teamId: ID!, shiftId: ID!): Boolean
}

type Subscription {
  changeNotification(subscriptionId: ID!): ChangeNotification
}
