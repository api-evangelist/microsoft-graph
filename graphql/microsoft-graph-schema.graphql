# ─── Authentication ───────────────────────────────────────────────────────────

type Authentication {
  id: ID!
  methods: [AuthenticationMethod!]
  passwordMethods: [PasswordAuth!]
  phoneMethods: [PhoneAuth!]
  emailMethods: [EmailAuth!]
  softwareOathMethods: [TOTPAuth!]
  windowsHelloForBusinessMethods: [WindowsHello!]
  fido2Methods: [FIDO2!]
}

interface AuthenticationMethod {
  id: ID!
  createdDateTime: DateTime
}

type PasswordAuth implements AuthenticationMethod {
  id: ID!
  createdDateTime: DateTime
  password: String
}

type PhoneAuth implements AuthenticationMethod {
  id: ID!
  createdDateTime: DateTime
  phoneNumber: String
  phoneType: String
  smsSignInState: String
}

type EmailAuth implements AuthenticationMethod {
  id: ID!
  createdDateTime: DateTime
  emailAddress: String
}

type TOTPAuth implements AuthenticationMethod {
  id: ID!
  createdDateTime: DateTime
  secretKey: String
}

type WindowsHello implements AuthenticationMethod {
  id: ID!
  createdDateTime: DateTime
  displayName: String
  deviceId: String
  keyStrength: String
}

type FIDO2 implements AuthenticationMethod {
  id: ID!
  createdDateTime: DateTime
  displayName: String
  aaGuid: String
  attestationCertificates: [String!]
  model: String
  publicKeyCredential: String
}

