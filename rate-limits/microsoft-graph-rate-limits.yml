specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Microsoft Graph
providerId: microsoft-graph
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Rate Limiting
  - Microsoft Graph
  - Microsoft 365
  - Identity
  - Microsoft
description: Microsoft Graph applies per-service throttling on top of a global per-app ceiling of 130,000
  requests per 10 seconds. Each service (mail, calendar, files, identity, Teams, Excel, education, reports)
  has its own per-app-per-tenant and per-app-across-all-tenants quotas. Identity & directory uses a ResourceUnit
  token-bucket model with size-tiered quotas (Small / Medium / Large tenant). Returns 429 with Retry-After.
sources:
  - https://learn.microsoft.com/en-us/graph/throttling
  - https://learn.microsoft.com/en-us/graph/throttling-limits
headers:
  retryAfter: Retry-After
  requestId: request-id
  throttleScope: x-ms-throttle-scope
  throttleLimit: x-ms-throttle-limit-percentage
  throttlePriority: x-ms-throttle-priority
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Global ceiling per application across all tenants
    scope: application
    metric: requests_per_10_seconds
    limit: 130000
    timeFrame: second
  - name: Identity & Access (read) — small tenant (<50 users)
    scope: app/tenant
    metric: resource_units_per_10_seconds
    limit: 3500
    timeFrame: second
  - name: Identity & Access (read) — medium tenant (50–500 users)
    scope: app/tenant
    metric: resource_units_per_10_seconds
    limit: 5000
    timeFrame: second
  - name: Identity & Access (read) — large tenant (>500 users)
    scope: app/tenant
    metric: resource_units_per_10_seconds
    limit: 8000
    timeFrame: second
  - name: Identity & Access (write) per app/tenant
    scope: app/tenant
    metric: requests_per_2m30s
    limit: 3000
    timeFrame: second
  - name: Identity & Access (read) per app across tenants
    scope: application
    metric: resource_units_per_20_seconds
    limit: 150000
    timeFrame: second
  - name: Identity & Access (write) per app across tenants
    scope: application
    metric: requests_per_5_minutes
    limit: 35000
    timeFrame: minute
  - name: Excel workbook — any request per app/tenant
    scope: app/tenant
    metric: requests_per_10_seconds
    limit: 1500
    timeFrame: second
  - name: Excel workbook — any request per app across tenants
    scope: application
    metric: requests_per_10_seconds
    limit: 5000
    timeFrame: second
  - name: Teams Calls per app/tenant
    scope: app/tenant
    metric: requests_per_15_seconds
    limit: 50000
    timeFrame: second
  - name: Teams Presence per app/tenant
    scope: app/tenant
    metric: requests_per_30_seconds
    limit: 10000
    timeFrame: second
  - name: Teams Call Records per app/tenant
    scope: app/tenant
    metric: requests_per_20_seconds
    limit: 1500
    timeFrame: second
  - name: Teams Call Records per application across tenants
    scope: application
    metric: requests_per_20_seconds
    limit: 15000
    timeFrame: second
  - name: Identity & Access Reports — any request per app/tenant
    scope: app/tenant
    metric: requests_per_10_seconds
    limit: 5
    timeFrame: second
  - name: Education service per app/tenant
    scope: app/tenant
    metric: requests_per_10_seconds
    limit: 35000
    timeFrame: second
  - name: Exchange Message Trace
    scope: tenant
    metric: requests_per_5_minutes
    limit: 100
    timeFrame: minute
  - name: Outlook (mail / calendar / contacts)
    scope: app/mailbox
    metric: varies
    limit: per-mailbox throttling — see Outlook docs; fall back to Retry-After
  - name: Files (OneDrive / SharePoint)
    scope: app/tenant
    metric: varies
    limit: see SharePoint Online throttling guidance
policies:
  - name: ResourceUnit cost model
    description: Identity / directory requests are charged base ResourceUnits (most are 1 RU; some paths
      cost 2–5 RU). Plan capacity in ResourceUnits, not raw requests.
  - name: Backoff Strategy
    description: Honour Retry-After on 429 / 503; the SDK handlers do this by default.
  - name: Use change tracking
    description: Prefer delta queries and change notifications (subscriptions) over polling.
  - name: Use $batch
    description: Combine up to 20 requests in a single $batch envelope; each is throttled individually.
  - name: Microsoft Graph Data Connect for bulk
    description: For tenant-wide bulk extraction, use Data Connect to bypass REST throttling.
  - name: Request priority
    description: Set x-ms-throttle-priority (high / normal / low) to influence which traffic is shed first
      under contention.
