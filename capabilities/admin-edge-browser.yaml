naftiko: 1.0.0-alpha2
info:
  label: Microsoft Graph Admin API — Edge Browser
  description: 'Microsoft Graph Admin API — Edge Browser. 3 operations. Lead operation: Microsoft Graph Get Edge settings.
    Self-contained Naftiko capability covering one Microsoft Graph business surface.'
  tags:
  - Microsoft Graph
  - Edge Browser
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_GRAPH_API_KEY: MICROSOFT_GRAPH_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-edge-browser
    baseUri: https://graph.microsoft.com/v1.0
    description: Microsoft Graph Admin API — Edge Browser business capability. Self-contained, no shared references.
    resources:
    - name: admin-edge
      path: /admin/edge
      operations:
      - name: getadminedge
        method: GET
        description: Microsoft Graph Get Edge settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: $select
          in: query
          type: array
          description: Select properties to be returned
        - name: $expand
          in: query
          type: array
          description: Expand related entities
      - name: updateadminedge
        method: PATCH
        description: Microsoft Graph Update Edge settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteadminedge
        method: DELETE
        description: Microsoft Graph Delete Edge settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: If-Match
          in: header
          type: string
          description: ETag for optimistic concurrency control
  exposes:
  - type: rest
    namespace: admin-edge-browser-rest
    port: 8080
    description: REST adapter for Microsoft Graph Admin API — Edge Browser. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/admin/edge
      name: admin-edge
      description: REST surface for admin-edge.
      operations:
      - method: GET
        name: getadminedge
        description: Microsoft Graph Get Edge settings
        call: admin-edge-browser.getadminedge
        with:
          $select: rest.$select
          $expand: rest.$expand
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateadminedge
        description: Microsoft Graph Update Edge settings
        call: admin-edge-browser.updateadminedge
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteadminedge
        description: Microsoft Graph Delete Edge settings
        call: admin-edge-browser.deleteadminedge
        with:
          If-Match: rest.If-Match
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-edge-browser-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Graph Admin API — Edge Browser. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: microsoft-graph-get-edge-settings
      description: Microsoft Graph Get Edge settings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-edge-browser.getadminedge
      with:
        $select: tools.$select
        $expand: tools.$expand
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-graph-update-edge-settings
      description: Microsoft Graph Update Edge settings
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: admin-edge-browser.updateadminedge
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-graph-delete-edge-settings
      description: Microsoft Graph Delete Edge settings
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: admin-edge-browser.deleteadminedge
      with:
        If-Match: tools.If-Match
      outputParameters:
      - type: object
        mapping: $.
