        destructive: false
        idempotent: false
      call: agreements-agreements.createagreement
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-graph-count-agreements
      description: Microsoft Graph Count agreements
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: agreements-agreements.countagreements
      outputParameters:
