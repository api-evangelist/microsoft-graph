        method: GET
        description: Microsoft Graph Get an agreement by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: $select
          in: query
          type: array
          description: Select properties to be returned
        - name: $expand
          in: query
          type: array
          description: Expand related entities
      - name: updateagreement
        method: PATCH
        description: Microsoft Graph Update an agreement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteagreement
        method: DELETE
        description: Microsoft Graph Delete an agreement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: If-Match
          in: header
          type: string
          description: ETag for optimistic concurrency control
  exposes:
  - type: rest
    namespace: agreements-agreements-rest
    port: 8080
    description: REST adapter for Microsoft Graph Agreements API — Agreements. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/agreements
      name: agreements
      description: REST surface for agreements.
      operations:
      - method: GET
        name: listagreements
        description: Microsoft Graph List all agreements
        call: agreements-agreements.listagreements
        with:
          $orderby: rest.$orderby
          $select: rest.$select
          $expand: rest.$expand
        outputParameters:
