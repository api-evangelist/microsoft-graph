          mapping: $.
      - method: POST
        name: createagreement
        description: Microsoft Graph Create a new agreement
        call: agreements-agreements.createagreement
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/agreements/count
