naftiko: 1.0.0-alpha2
info:
  label: Microsoft Graph Admin API — Administration
  description: 'Microsoft Graph Admin API — Administration. 2 operations. Lead operation: Microsoft Graph Get admin singleton.
    Self-contained Naftiko capability covering one Microsoft Graph business surface.'
  tags:
  - Microsoft Graph
  - Administration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_GRAPH_API_KEY: MICROSOFT_GRAPH_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-administration
    baseUri: https://graph.microsoft.com/v1.0
    description: Microsoft Graph Admin API — Administration business capability. Self-contained, no shared references.
    resources:
    - name: admin
      path: /admin
      operations:
      - name: getadmin
        method: GET
        description: Microsoft Graph Get admin singleton
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: $select
          in: query
          type: array
          description: Select properties to be returned
        - name: $expand
          in: query
          type: array
          description: Expand related entities
      - name: updateadmin
        method: PATCH
        description: Microsoft Graph Update admin singleton
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: admin-administration-rest
    port: 8080
    description: REST adapter for Microsoft Graph Admin API — Administration. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/admin
      name: admin
      description: REST surface for admin.
      operations:
      - method: GET
        name: getadmin
        description: Microsoft Graph Get admin singleton
        call: admin-administration.getadmin
        with:
          $select: rest.$select
          $expand: rest.$expand
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateadmin
        description: Microsoft Graph Update admin singleton
        call: admin-administration.updateadmin
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-administration-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Graph Admin API — Administration. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: microsoft-graph-get-admin-singleton
      description: Microsoft Graph Get admin singleton
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-administration.getadmin
      with:
        $select: tools.$select
        $expand: tools.$expand
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-graph-update-admin-singleton
      description: Microsoft Graph Update admin singleton
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: admin-administration.updateadmin
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
