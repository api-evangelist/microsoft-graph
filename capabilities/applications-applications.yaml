naftiko: 1.0.0-alpha2
info:
  label: Microsoft Graph Applications API — Applications
  description: 'Microsoft Graph Applications API — Applications. 6 operations. Lead operation: Microsoft Graph List applications.
    Self-contained Naftiko capability covering one Microsoft Graph business surface.'
  tags:
  - Microsoft Graph
  - Applications
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_GRAPH_API_KEY: MICROSOFT_GRAPH_API_KEY
capability:
  consumes:
  - type: http
    namespace: applications-applications
    baseUri: https://graph.microsoft.com/v1.0
    description: Microsoft Graph Applications API — Applications business capability. Self-contained, no shared references.
    resources:
    - name: applications
      path: /applications
      operations:
      - name: listapplications
        method: GET
        description: Microsoft Graph List applications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ConsistencyLevel
          in: header
          type: string
          description: 'Indicates the requested consistency level. Documentation URL: https://docs.microsoft.com/graph/aad-advanced-queries'
        - name: $orderby
          in: query
          type: array
          description: Order items by property values
        - name: $select
          in: query
          type: array
          description: Select properties to be returned
        - name: $expand
          in: query
          type: array
          description: Expand related entities
      - name: createapplications
        method: POST
        description: Microsoft Graph Create application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: applications-$count
      path: /applications/$count
      operations:
      - name: countapplications
        method: GET
        description: Microsoft Graph Get the number of the resource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ConsistencyLevel
          in: header
          type: string
          description: 'Indicates the requested consistency level. Documentation URL: https://docs.microsoft.com/graph/aad-advanced-queries'
    - name: applications-application-id
      path: /applications/{application-id}
      operations:
      - name: getapplications
        method: GET
        description: Microsoft Graph Get application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: $select
          in: query
          type: array
          description: Select properties to be returned
        - name: $expand
          in: query
          type: array
          description: Expand related entities
      - name: updateapplications
        method: PATCH
        description: Microsoft Graph Upsert application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteapplications
        method: DELETE
        description: Microsoft Graph Delete application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: If-Match
          in: header
          type: string
          description: ETag
  exposes:
  - type: rest
    namespace: applications-applications-rest
    port: 8080
    description: REST adapter for Microsoft Graph Applications API — Applications. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/applications
      name: applications
      description: REST surface for applications.
      operations:
      - method: GET
        name: listapplications
        description: Microsoft Graph List applications
        call: applications-applications.listapplications
        with:
          ConsistencyLevel: rest.ConsistencyLevel
          $orderby: rest.$orderby
          $select: rest.$select
          $expand: rest.$expand
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createapplications
        description: Microsoft Graph Create application
        call: applications-applications.createapplications
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/applications/count
      name: applications-count
      description: REST surface for applications-$count.
      operations:
      - method: GET
        name: countapplications
        description: Microsoft Graph Get the number of the resource
        call: applications-applications.countapplications
        with:
          ConsistencyLevel: rest.ConsistencyLevel
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/applications/{application-id}
      name: applications-application-id
      description: REST surface for applications-application-id.
      operations:
      - method: GET
        name: getapplications
        description: Microsoft Graph Get application
        call: applications-applications.getapplications
        with:
          $select: rest.$select
          $expand: rest.$expand
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateapplications
        description: Microsoft Graph Upsert application
        call: applications-applications.updateapplications
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteapplications
        description: Microsoft Graph Delete application
        call: applications-applications.deleteapplications
        with:
          If-Match: rest.If-Match
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: applications-applications-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Graph Applications API — Applications. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: microsoft-graph-list-applications
      description: Microsoft Graph List applications
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: applications-applications.listapplications
      with:
        ConsistencyLevel: tools.ConsistencyLevel
        $orderby: tools.$orderby
        $select: tools.$select
        $expand: tools.$expand
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-graph-create-application
      description: Microsoft Graph Create application
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: applications-applications.createapplications
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-graph-get-number-resource
      description: Microsoft Graph Get the number of the resource
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: applications-applications.countapplications
      with:
        ConsistencyLevel: tools.ConsistencyLevel
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-graph-get-application
      description: Microsoft Graph Get application
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: applications-applications.getapplications
      with:
        $select: tools.$select
        $expand: tools.$expand
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-graph-upsert-application
      description: Microsoft Graph Upsert application
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: applications-applications.updateapplications
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-graph-delete-application
      description: Microsoft Graph Delete application
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: applications-applications.deleteapplications
      with:
        If-Match: tools.If-Match
      outputParameters:
      - type: object
        mapping: $.
