      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-graph-get-people-me
      description: Microsoft Graph Get people from me
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: microsoft-graph-me-person.megetpeople
      with:
        $select: tools.$select
        $expand: tools.$expand
      outputParameters:
      - type: object
        mapping: $.
