naftiko: 1.0.0-alpha2
info:
  label: Microsoft Graph Applications API — Applications Restore
  description: 'Microsoft Graph Applications API — Applications Restore. 1 operations. Lead operation: Microsoft Graph Create
    Restore. Self-contained Naftiko capability covering one Microsoft Graph business surface.'
  tags:
  - Microsoft Graph
  - Applications Restore
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_GRAPH_API_KEY: MICROSOFT_GRAPH_API_KEY
capability:
  consumes:
  - type: http
    namespace: applications-applications-restore
    baseUri: https://graph.microsoft.com/v1.0
    description: Microsoft Graph Applications API — Applications Restore business capability. Self-contained, no shared references.
    resources:
    - name: applications-application-id-restore
      path: /applications/{application-id}/restore
      operations:
      - name: restoreapplications
        method: POST
        description: Microsoft Graph Create Restore
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: applications-applications-restore-rest
    port: 8080
    description: REST adapter for Microsoft Graph Applications API — Applications Restore. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/applications/{application-id}/restore
      name: applications-application-id-restore
      description: REST surface for applications-application-id-restore.
      operations:
      - method: POST
        name: restoreapplications
        description: Microsoft Graph Create Restore
        call: applications-applications-restore.restoreapplications
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: applications-applications-restore-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Graph Applications API — Applications Restore. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: microsoft-graph-create-restore
      description: Microsoft Graph Create Restore
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: applications-applications-restore.restoreapplications
      outputParameters:
      - type: object
        mapping: $.
