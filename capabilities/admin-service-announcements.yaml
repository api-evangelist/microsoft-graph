naftiko: 1.0.0-alpha2
info:
  label: Microsoft Graph Admin API — Service Announcements
  description: 'Microsoft Graph Admin API — Service Announcements. 1 operations. Lead operation: Microsoft Graph Get service
    announcement. Self-contained Naftiko capability covering one Microsoft Graph business surface.'
  tags:
  - Microsoft Graph
  - Service Announcements
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_GRAPH_API_KEY: MICROSOFT_GRAPH_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-service-announcements
    baseUri: https://graph.microsoft.com/v1.0
    description: Microsoft Graph Admin API — Service Announcements business capability. Self-contained, no shared references.
    resources:
    - name: admin-serviceAnnouncement
      path: /admin/serviceAnnouncement
      operations:
      - name: getserviceannouncement
        method: GET
        description: Microsoft Graph Get service announcement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: admin-service-announcements-rest
    port: 8080
    description: REST adapter for Microsoft Graph Admin API — Service Announcements. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/admin/serviceannouncement
      name: admin-serviceannouncement
      description: REST surface for admin-serviceAnnouncement.
      operations:
      - method: GET
        name: getserviceannouncement
        description: Microsoft Graph Get service announcement
        call: admin-service-announcements.getserviceannouncement
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-service-announcements-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Graph Admin API — Service Announcements. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: microsoft-graph-get-service-announcement
      description: Microsoft Graph Get service announcement
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-service-announcements.getserviceannouncement
      outputParameters:
      - type: object
        mapping: $.
