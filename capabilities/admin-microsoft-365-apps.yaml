naftiko: 1.0.0-alpha2
info:
  label: Microsoft Graph Admin API — Microsoft 365 Apps
  description: 'Microsoft Graph Admin API — Microsoft 365 Apps. 2 operations. Lead operation: Microsoft Graph Get Microsoft
    365 Apps settings. Self-contained Naftiko capability covering one Microsoft Graph business surface.'
  tags:
  - Microsoft Graph
  - Microsoft 365 Apps
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_GRAPH_API_KEY: MICROSOFT_GRAPH_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-microsoft-365-apps
    baseUri: https://graph.microsoft.com/v1.0
    description: Microsoft Graph Admin API — Microsoft 365 Apps business capability. Self-contained, no shared references.
    resources:
    - name: admin-microsoft365Apps
      path: /admin/microsoft365Apps
      operations:
      - name: getmicrosoft365apps
        method: GET
        description: Microsoft Graph Get Microsoft 365 Apps settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatemicrosoft365apps
        method: PATCH
        description: Microsoft Graph Update Microsoft 365 Apps settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: admin-microsoft-365-apps-rest
    port: 8080
    description: REST adapter for Microsoft Graph Admin API — Microsoft 365 Apps. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/admin/microsoft365apps
      name: admin-microsoft365apps
      description: REST surface for admin-microsoft365Apps.
      operations:
      - method: GET
        name: getmicrosoft365apps
        description: Microsoft Graph Get Microsoft 365 Apps settings
        call: admin-microsoft-365-apps.getmicrosoft365apps
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatemicrosoft365apps
        description: Microsoft Graph Update Microsoft 365 Apps settings
        call: admin-microsoft-365-apps.updatemicrosoft365apps
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-microsoft-365-apps-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Graph Admin API — Microsoft 365 Apps. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: microsoft-graph-get-microsoft-365
      description: Microsoft Graph Get Microsoft 365 Apps settings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-microsoft-365-apps.getmicrosoft365apps
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-graph-update-microsoft-365
      description: Microsoft Graph Update Microsoft 365 Apps settings
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: admin-microsoft-365-apps.updatemicrosoft365apps
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
