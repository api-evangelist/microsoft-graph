naftiko: 1.0.0-alpha2
info:
  label: Microsoft Graph Admin API
  description: Microsoft Graph API for managing administrative resources in Microsoft Entra ID. This API enables administrators
    to manage Microsoft Edge browser settings, Internet Explorer mode configurations, site lists, shared browser sites, Microsoft
    365 Apps installation options, people insights, service announcements, SharePoint settings, Copilot administration, directory
    administrative units, and admin consent policies.
  tags:
  - Microsoft
  - Graph
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
