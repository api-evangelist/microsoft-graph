    namespace: microsoft-graph-external-external-rest
    port: 8080
    description: REST adapter for Microsoft Graph OData Service for namespace microsoft.graph — External.external. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/external
      name: external
      description: REST surface for external.
      operations:
