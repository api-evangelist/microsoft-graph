      no shared references.
    resources:
    - name: external
      path: /external
      operations:
      - name: externalexternalgetexternal
        method: GET
        description: Microsoft Graph Get external
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: $select
          in: query
          type: array
          description: Select properties to be returned
        - name: $expand
          in: query
          type: array
          description: Expand related entities
      - name: externalexternalupdateexternal
        method: PATCH
        description: Microsoft Graph Update external
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
