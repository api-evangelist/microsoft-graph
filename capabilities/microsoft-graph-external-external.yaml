naftiko: 1.0.0-alpha2
info:
  label: Microsoft Graph OData Service for namespace microsoft.graph — External.external
  description: 'Microsoft Graph OData Service for namespace microsoft.graph — External.external. 2 operations. Lead operation:
    Microsoft Graph Get external. Self-contained Naftiko capability covering one Microsoft Graph business surface.'
  tags:
