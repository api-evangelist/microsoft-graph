    port: 9090
    transport: http
    description: MCP adapter for Microsoft Graph OData Service for namespace microsoft.graph — External.external. One tool
      per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: microsoft-graph-get-external
      description: Microsoft Graph Get external
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: microsoft-graph-external-external.externalexternalgetexternal
      with:
        $select: tools.$select
        $expand: tools.$expand
      outputParameters:
