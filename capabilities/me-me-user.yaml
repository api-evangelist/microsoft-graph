naftiko: 1.0.0-alpha2
info:
  label: Microsoft Graph Me — Me.user
  description: 'Microsoft Graph Me — Me.user. 2 operations. Lead operation: Microsoft Graph Get a user. Self-contained Naftiko
    capability covering one Microsoft Graph business surface.'
  tags:
  - Microsoft Graph
  - Me.user
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_GRAPH_API_KEY: MICROSOFT_GRAPH_API_KEY
capability:
  consumes:
  - type: http
    namespace: me-me-user
    baseUri: ''
    description: Microsoft Graph Me — Me.user business capability. Self-contained, no shared references.
    resources:
    - name: me
      path: /me
      operations:
      - name: meusergetuser
        method: GET
        description: Microsoft Graph Get a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ConsistencyLevel
          in: header
          type: string
          description: 'Indicates the requested consistency level. Documentation URL: https://docs.microsoft.com/graph/aad-advanced-queries'
        - name: $select
          in: query
          type: array
          description: Select properties to be returned
        - name: $expand
          in: query
          type: array
          description: Expand related entities
      - name: meuserupdateuser
        method: PATCH
        description: Microsoft Graph Update user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: me-me-user-rest
    port: 8080
    description: REST adapter for Microsoft Graph Me — Me.user. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/me
      name: me
      description: REST surface for me.
      operations:
      - method: GET
        name: meusergetuser
        description: Microsoft Graph Get a user
        call: me-me-user.meusergetuser
        with:
          ConsistencyLevel: rest.ConsistencyLevel
          $select: rest.$select
          $expand: rest.$expand
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: meuserupdateuser
        description: Microsoft Graph Update user
        call: me-me-user.meuserupdateuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: me-me-user-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Graph Me — Me.user. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: microsoft-graph-get-user
      description: Microsoft Graph Get a user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: me-me-user.meusergetuser
      with:
        ConsistencyLevel: tools.ConsistencyLevel
        $select: tools.$select
        $expand: tools.$expand
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-graph-update-user
      description: Microsoft Graph Update user
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: me-me-user.meuserupdateuser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
