    port: 9090
    transport: http
    description: MCP adapter for Microsoft Graph Shares — Shares.site. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: microsoft-graph-get-site-shares
      description: Microsoft Graph Get site from shares
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: shares-shares-site.sharesgetsite
      with:
        $select: tools.$select
        $expand: tools.$expand
      outputParameters:
      - type: object
        mapping: $.
