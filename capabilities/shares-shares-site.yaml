  description: 'Microsoft Graph Shares — Shares.site. 1 operations. Lead operation: Microsoft Graph Get site from shares.
    Self-contained Naftiko capability covering one Microsoft Graph business surface.'
  tags:
  - Microsoft Graph
  - Shares.site
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_GRAPH_API_KEY: MICROSOFT_GRAPH_API_KEY
capability:
  consumes:
  - type: http
    namespace: shares-shares-site
    baseUri: ''
    description: Microsoft Graph Shares — Shares.site business capability. Self-contained, no shared references.
    resources:
    - name: shares-sharedDriveItem-id-site
      path: /shares/{sharedDriveItem-id}/site
      operations:
      - name: sharesgetsite
        method: GET
        description: Microsoft Graph Get site from shares
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: $select
          in: query
          type: array
          description: Select properties to be returned
        - name: $expand
          in: query
          type: array
          description: Expand related entities
  exposes:
  - type: rest
    namespace: shares-shares-site-rest
    port: 8080
    description: REST adapter for Microsoft Graph Shares — Shares.site. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/shares/{shareddriveitem-id}/site
      name: shares-shareddriveitem-id-site
      description: REST surface for shares-sharedDriveItem-id-site.
      operations:
      - method: GET
        name: sharesgetsite
        description: Microsoft Graph Get site from shares
        call: shares-shares-site.sharesgetsite
        with:
          $select: rest.$select
          $expand: rest.$expand
        outputParameters:
        - type: object
          mapping: $.
