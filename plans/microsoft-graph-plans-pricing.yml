specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Microsoft Graph
providerId: microsoft-graph
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Azure AD
  - Collaboration
  - Contacts
  - Documents
  - Email
  - Graph
  - Identity
  - Microsoft
  - Office 365
  - Productivity
description: Microsoft Graph is the unified API surface for Microsoft 365, Entra ID, Windows 10/11, and
  Enterprise Mobility + Security. Access is gated by the underlying Microsoft 365 / Office 365 / Entra
  / Intune / Dynamics seat licence rather than a Graph-specific tariff. There is no per-call list price
  for Microsoft Graph itself; throughput is controlled via per-app and per-tenant throttling. Microsoft
  Graph Data Connect (bulk extraction to Azure Data Lake) is metered separately under Azure consumption.
sources:
  - https://www.microsoft.com/en-us/microsoft-365/business/compare-all-plans
  - https://www.microsoft.com/en-us/microsoft-365/enterprise/microsoft365-plans-and-pricing
  - https://learn.microsoft.com/en-us/graph/data-connect-concept-overview
plans:
  - id: microsoft-graph-included-with-m365
    name: Included with Microsoft 365 / Office 365 / Entra ID
    type: subscription
    description: All Microsoft Graph endpoints are accessible to apps registered in a Microsoft Entra
      tenant that holds an entitling SKU. There is no separate Graph charge.
    entries:
      - label: Microsoft 365 Business Basic
        name: m365_business_basic
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '6.00'
        userMultiplied: true
      - label: Microsoft 365 Business Standard
        name: m365_business_standard
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '12.50'
        userMultiplied: true
      - label: Microsoft 365 E3
        name: m365_e3
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '36.00'
        userMultiplied: true
      - label: Microsoft 365 E5
        name: m365_e5
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '57.00'
        userMultiplied: true
      - label: Microsoft Entra ID P1
        name: entra_id_p1
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '6.00'
        userMultiplied: true
      - label: Microsoft Entra ID P2
        name: entra_id_p2
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '9.00'
        userMultiplied: true
    elements:
      - name: Microsoft Graph v1.0 endpoints
      - name: Microsoft Graph beta endpoints
      - name: Mail / Calendar / Contacts (Outlook)
      - name: Files (OneDrive / SharePoint)
      - name: Teams (chats, channels, calls, presence)
      - name: Users / Groups / Directory (Entra)
      - name: Identity Protection / Identity Governance
      - name: Excel workbook API
      - name: Planner and To Do
      - name: Reports and audit logs
      - name: Subscriptions / change notifications
  - id: microsoft-graph-data-connect
    name: Microsoft Graph Data Connect
    type: usage-based
    description: Bulk extraction of Microsoft 365 data to Azure Data Lake / Synapse, billed via Azure
      consumption. Used for analytics and ML at tenant scale; bypasses Graph REST throttling.
    entries:
      - label: Bulk data extraction (Azure consumption)
        name: data_connect
        type: metered
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see Azure pricing calculator for Microsoft Graph Data Connect
        userMultiplied: false
    elements:
      - name: Datasets in Azure Data Lake Gen2 / Synapse
      - name: Privileged access management workflow
      - name: Throttling-free bulk extraction
  - id: microsoft-graph-developer-free
    name: Developer access (Microsoft 365 Developer Program)
    type: freemium
    description: Free developer tenant with sample data for building and testing Microsoft Graph apps.
      Renews while the program subscription is active.
    entries:
      - label: Free developer tenant
        name: dev_program
        type: subscription
        metric: tenant
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Microsoft 365 E5 developer subscription
      - name: 25 sample users with content
      - name: Sandbox tenant
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
  - name: Microsoft
    email: graphsdkpub@microsoft.com
    url: https://developer.microsoft.com/en-us/graph
