      Microsoft Graph Groups is the Microsoft Graph API surface for managing Azure
      AD and Microsoft 365 groups and everything connected to them. It lets you create,
      read, update, and delete groups; add or remove owners and members (including
      dynamic membership rules); query transitive membership and changes via delta;
      and manage group settings and lifecycle policies such as expiration.
