        type: Documentation
      - url: openapi/filteroperators-openapi-original.yml
        type: OpenAPI
    description: >-
      Microsoft Graph filter operators are the OData $filter expressions you add to
      Graph API requests to narrow results on the server before they’re returned.
      They let you select only the resources that match certain criteria—such as equality
      and comparison checks (eq, ne, gt, ge, lt, le), logical combinations (and, or,
      not), string matching (startswith, endswith, contains), membership tests (in),
      and collection predicates (any, all).
