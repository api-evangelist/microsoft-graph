        type: Documentation
      - url: openapi/grouplifecyclepolicies-openapi-original.yml
        type: OpenAPI
    description: >-
      Microsoft Graph Group Lifecycle Policies let administrators govern the lifespan
      of Microsoft 365 groups by setting an expiration period, scoping the policy
      to all or selected groups, and automating renewal and cleanup. When a group
      nears expiration, owners (and optional alternate email recipients) receive reminder
      emails; if not renewed, the group is soft‑deleted and can be restored within
      a grace period.
  - aid: microsoft-graph:microsoft-graph-groups
    name: Microsoft Graph Groups
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
