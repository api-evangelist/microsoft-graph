        type: Documentation
      - url: openapi/places-openapi-original.yml
        type: OpenAPI
    description: >-
      Microsoft Graph Places is an API surface in Microsoft Graph that lets applications
      discover and work with physical location resources in Microsoft 365—primarily
      meeting rooms and room lists (and, in some tenants, workspaces). It provides
      a tenant-wide, directory-backed catalog of places that apps can list and query,
      returning rich metadata such as name, address, coordinates, building and floor
      details, email address, and capacity.
  - aid: microsoft-graph:microsoft-graph-planner
    name: Microsoft Graph Planner
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
