        type: Documentation
      - url: openapi/permissiongrants-openapi-original.yml
        type: OpenAPI
    description: >-
      Microsoft Graph permission grants are the records and APIs in Microsoft Entra
      ID that represent the consent an application has to access resources. They link
      a client app (service principal) to a resource API and the specific permissions
      approved, and are used during token issuance to determine what the app can do.
  - aid: microsoft-graph:microsoft-graph-places
    name: Microsoft Graph Places
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
