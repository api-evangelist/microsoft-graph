        type: OpenAPI
    description: >-
      Microsoft Graph Identity Protection exposes Microsoft Entra ID (formerly Azure
      AD) Identity Protection signals and controls through the Graph API so you can
      detect, investigate, and remediate identity risks at scale.
  - aid: microsoft-graph:microsoft-graph-identity-providers
    name: Microsoft Graph Identity Providers
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
