    description: >-
      Microsoft Graph Identity Governance is the API surface that lets you automate
      and integrate the identity governance capabilities of Microsoft Entra ID (formerly
      Azure Active Directory). It helps you enforce least-privilege and zero-trust
      by controlling and auditing who gets access to what, for how long, and why—across
      employees, contractors, guests, and connected applications.
  - aid: microsoft-graph:microsoft-graph-identity-protection
    name: Microsoft Graph Identity Protection
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
