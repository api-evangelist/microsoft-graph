        type: OpenAPI
    description: >-
      Microsoft Graph Information Protection is a set of Microsoft Graph APIs that
      expose Microsoft Purview Information Protection (sensitivity labels and related
      policies) to applications. It enables developers to discover a tenant’s label
      taxonomy and policy settings, evaluate which label should apply to given content,
      and programmatically classify and label files or emails.
  - aid: microsoft-graph:microsoft-graph-invitations
    name: Microsoft Graph Invitations
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
