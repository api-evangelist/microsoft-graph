        type: Documentation
      - url: openapi/planner-openapi-original.yml
        type: OpenAPI
    description: >-
      Microsoft Graph Planner is the set of Microsoft Graph APIs that lets developers
      programmatically work with Microsoft Planner data across Microsoft 365. With
      it, you can create and manage plans, buckets, and tasks; assign tasks to people;
      set due dates, priority, progress, labels, checklists, and attachments; and
      move tasks across boards to reflect workflow.
  - aid: microsoft-graph:microsoft-graph-policies
    name: Microsoft Graph Policies
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://graph.microsoft.com/v1.0
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/policy-overview?view=graph-rest-1.0
