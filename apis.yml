      Microsoft Graph Search is the unified enterprise search capability for Microsoft
      365, exposed via the Microsoft Graph API, that lets apps query and discover
      content across services like SharePoint, OneDrive, Outlook, Teams, and more—as
      well as external systems connected through Graph connectors. It returns security‑trimmed,
      relevance‑ranked, and personalized results based on the user’s permissions and
      work signals.
  - aid: microsoft-graph:microsoft-graph-security
    name: Microsoft Graph Security
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://graph.microsoft.com/v1.0
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/security-api-overview?view=graph-rest-1.0
    properties:
      - url: https://learn.microsoft.com/en-us/graph/api/resources/security-api-overview?view=graph-rest-1.0
        type: Documentation
      - url: openapi/security-openapi-original.yml
        type: OpenAPI
    description: >-
      Microsoft Graph Security is a unified set of APIs within Microsoft Graph that
      lets you access, correlate, and act on security data across Microsoft 365 and
      integrated security solutions. It normalizes alerts and incidents from Microsoft
      Defender products and other providers, exposes security posture information
      such as Secure Score, and supports managing threat intelligence indicators.
  - aid: microsoft-graph:microsoft-graph-service-principals
    name: Microsoft Graph Service Principals
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://graph.microsoft.com/v1.0
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/serviceprincipal?view=graph-rest-1.0
    properties:
      - url: https://learn.microsoft.com/en-us/graph/api/resources/serviceprincipal?view=graph-rest-1.0
        type: Documentation
      - url: openapi/serviceprincipals-openapi-original.yml
        type: OpenAPI
    description: >-
      In Microsoft Entra ID (formerly Azure AD), a service principal is the identity
      an application uses to access resources, and the Microsoft Graph service principal
      is the tenant-local representation of the Microsoft Graph API itself. It publishes
      the set of OAuth 2.0 delegated scopes and application roles (permissions) that
      apps can request, and it is the target against which your app’s own service
      principal is granted consent.
  - aid: microsoft-graph:microsoft-graph-shares
    name: Microsoft Graph Shares
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://graph.microsoft.com/v1.0
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/shares?view=graph-rest-1.0
    properties:
      - url: https://learn.microsoft.com/en-us/graph/api/resources/shares?view=graph-rest-1.0
        type: Documentation
      - url: openapi/shares-openapi-original.yml
        type: OpenAPI
    description: >-
      Microsoft Graph Shares is the part of Microsoft Graph that lets apps access
      a OneDrive or SharePoint item by its sharing link or token, without needing
      to know the site, drive, or item IDs. Given a share URL, you can resolve it
      to a sharedDriveItem and then work with the underlying driveItem or listItem:
      read metadata, navigate folder children, fetch thumbnails, and download content—and,
      if the link grants edit rights, make changes.
  - aid: microsoft-graph:microsoft-graph-sites
    name: Microsoft Graph Sites
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://graph.microsoft.com/v1.0
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/sharepoint?view=graph-rest-1.0
    properties:
      - url: https://learn.microsoft.com/en-us/graph/api/resources/sharepoint?view=graph-rest-1.0
        type: Documentation
      - url: openapi/sites-openapi-original.yml
        type: OpenAPI
    description: >-
      Microsoft Graph Sites is the Graph API surface for SharePoint Online, letting
      apps discover and work with sites and their content through a single, secure
      endpoint. It enables you to locate the root site or a site by URL, search for
      sites, and navigate a site’s structure to access document libraries (drives),
      lists, list items, files, and modern site pages.
  - aid: microsoft-graph:microsoft-graph-solutions
    name: Microsoft Graph Solutions
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://graph.microsoft.com/v1.0
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/solutions-overview?view=graph-rest-1.0
    properties:
      - url: https://learn.microsoft.com/en-us/graph/api/resources/solutions-overview?view=graph-rest-1.0
        type: Documentation
      - url: openapi/solutions-openapi-original.yml
        type: OpenAPI
    description: >-
      Microsoft Graph solutions connect apps to the data and intelligence across Microsoft
      365 through a single, unified API. They enable secure access to users, groups,
      mail, calendars, files, Teams chats and meetings, SharePoint, OneDrive, Planner,
      devices, and security signals, so you can build experiences that personalize
      collaboration, automate workflows, and derive insights.
  - aid: microsoft-graph:microsoft-graph-storage
    name: Microsoft Graph Storage
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://graph.microsoft.com/v1.0
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/filestorage?view=graph-rest-1.0
    properties:
      - url: https://learn.microsoft.com/en-us/graph/api/resources/filestorage?view=graph-rest-1.0
        type: Documentation
      - url: openapi/storage-openapi-original.yml
        type: OpenAPI
    description: >-
      “Microsoft Graph storage” typically refers to the storage capabilities exposed
      through Microsoft Graph—primarily OneDrive and SharePoint—via the Files and
      Drives APIs. It lets apps programmatically store and manage files and folders,
      upload and download (including large-file upload sessions), track changes with
      delta queries, generate thumbnails, search, and share content with rich permission
      controls.
  - aid: microsoft-graph:microsoft-graph-subscribed-skus
    name: Microsoft Graph Subscribed SKUs
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://graph.microsoft.com/v1.0
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/subscribedsku?view=graph-rest-1.0
    properties:
      - url: https://learn.microsoft.com/en-us/graph/api/resources/subscribedsku?view=graph-rest-1.0
        type: Documentation
      - url: openapi/subscribedskus-openapi-original.yml
        type: OpenAPI
    description: >-
      Microsoft Graph Subscribed SKUs is the API/resource that lists the Microsoft
      365/Azure AD license subscriptions your tenant owns. When you call GET /subscribedSkus,
      it returns each license plan (SKU) with its identifiers (skuId, skuPartNumber),
      seat counts (prepaidUnits and consumedUnits), subscription status (enabled,
      suspended, warning), and the included service plans.
  - aid: microsoft-graph:microsoft-graph-subscriptions
    name: Microsoft Graph Subscriptions
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://graph.microsoft.com/v1.0
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/subscription?view=graph-rest-1.0
    properties:
      - url: https://learn.microsoft.com/en-us/graph/api/resources/subscription?view=graph-rest-1.0
        type: Documentation
      - url: openapi/subscriptions-openapi-original.yml
        type: OpenAPI
    description: >-
      Microsoft Graph Subscriptions let your app receive near real-time change notifications
      (webhooks) when Microsoft 365 data changes—such as Outlook mail and calendar
      items, users and groups, files in OneDrive/SharePoint, or Teams chats and channels.
      You register a subscription that specifies the resource to watch and a publicly
      reachable HTTPS endpoint; Microsoft Graph validates the endpoint and then posts
      notifications whenever relevant items are created, updated, or deleted.
  - aid: microsoft-graph:microsoft-graph-teams
    name: Microsoft Graph Teams
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://graph.microsoft.com/v1.0
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/teams-api-overview?view=graph-rest-1.0
    properties:
      - url: https://learn.microsoft.com/en-us/graph/api/resources/teams-api-overview?view=graph-rest-1.0
        type: Documentation
      - url: openapi/teams-openapi-original.yml
        type: OpenAPI
    description: >-
      Microsoft Graph for Teams exposes Microsoft Teams data and capabilities through
      a single, secure API so you can build integrations and automate Teams at scale.
      With it, you can create and manage teams, channels, chats, and memberships;
      post and read messages; schedule and manage meetings and webinars; access presence
      and call records; and install or configure Teams apps and tabs.
  - aid: microsoft-graph:microsoft-graph-teams-templates
    name: Microsoft Graph Teams Templates
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://graph.microsoft.com/v1.0
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/teams-api-overview?view=graph-rest-1.0
    properties:
