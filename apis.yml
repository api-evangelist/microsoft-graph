        type: Documentation
      - url: openapi/teamstemplates-openapi-original.yml
        type: OpenAPI
    description: >-
      Needs a description.
  - aid: microsoft-graph:microsoft-graph-teamwork
    name: Microsoft Graph Teamwork
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://graph.microsoft.com/v1.0
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/teamwork?view=graph-rest-1.0
    properties:
      - url: https://learn.microsoft.com/en-us/graph/api/resources/teamwork?view=graph-rest-1.0
        type: Documentation
      - url: openapi/teamwork-openapi-original.yml
        type: OpenAPI
    description: >-
      Microsoft Graph Teamwork is the set of Microsoft Graph APIs that surface Microsoft
      Teams collaboration capabilities. It lets you programmatically create and manage
      teams and channels; add members and owners; read, post, and moderate chat and
      channel messages; install, configure, and manage Teams apps and tabs; work with
      frontline workforce features like schedules, shifts, and time off; use teamwork
      tags to target groups; send activity notifications; and discover a user’s associated
      teams.
  - aid: microsoft-graph:microsoft-graph-tenant-relationships
    name: Microsoft Graph Tenant Relationships
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://graph.microsoft.com/v1.0
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/tenantrelationship?view=graph-rest-1.0
    properties:
      - url: https://learn.microsoft.com/en-us/graph/api/resources/tenantrelationship?view=graph-rest-1.0
        type: Documentation
      - url: openapi/tenantrelationships-openapi-original.yml
        type: OpenAPI
    description: >-
      Microsoft Graph Tenant Relationships is the part of the Microsoft Graph API
      that lets you model and manage how your Microsoft Entra ID tenant relates to
      other tenants. It provides endpoints to discover external tenants, create and
      govern delegated admin relationships (GDAP) between partners and customers,
      manage membership in a multi-tenant organization, and access “managed tenants”
      data used by Microsoft 365 Lighthouse.
  - aid: microsoft-graph:microsoft-graph-users
    name: Microsoft Graph Users
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://graph.microsoft.com/v1.0
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/user?view=graph-rest-1.0
    properties:
      - url: https://learn.microsoft.com/en-us/graph/api/resources/user?view=graph-rest-1.0
        type: Documentation
      - url: openapi/users-openapi-original.yml
        type: OpenAPI
    description: >-
      Microsoft Graph Users refers to the Users resource in Microsoft Graph, which
      exposes Microsoft Entra ID (Azure AD) user accounts and their relationships
      and Microsoft 365 data through a unified API. It lets you list, read, create,
      update, and delete users; manage identities and lifecycle tasks such as assigning
      licenses, resetting passwords, and updating authentication settings; and retrieve
      related information like profile details, photos, managers, direct reports,
      group and role memberships.
