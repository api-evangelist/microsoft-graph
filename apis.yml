      Microsoft Graph Functions is the Excel capability in Microsoft Graph that lets
      developers invoke hundreds of Excel worksheet functions through REST, running
      calculations directly on workbooks stored in OneDrive or SharePoint without
      opening the Excel app.
  - aid: microsoft-graph:microsoft-graph-group-lifecycle-policies
    name: Microsoft Graph Group Lifecycle Policies
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
