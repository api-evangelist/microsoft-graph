        type: Documentation
      - url: openapi/print-openapi-original.yml
        type: OpenAPI
    description: >-
      Microsoft Graph Print (the Universal Print APIs in Microsoft Graph) lets developers
      integrate secure, cloud-based printing into their apps and workflows. Through
      these APIs, you can discover and register organization printers, manage printer
      shares and access, submit and spool print jobs (including uploading documents),
      set print options, and monitor job and device status. It also supports automation
      via print tasks and subscriptions for event-driven processing and notifications.
  - aid: microsoft-graph:microsoft-graph-privacy
