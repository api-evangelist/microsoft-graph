      - url: openapi/me-openapi-original.yml
        type: OpenAPI
    description: >-
      Microsoft Graph “Me” is a shortcut to the signed-in user’s resource, letting
      apps work with the current user’s data across Microsoft 365 without knowing
      their user ID.
