      Microsoft Graph Role Management provides a unified API to programmatically manage
      role-based access across Microsoft Entra ID (Azure AD) and supported services
      like Microsoft 365 and Intune. It lets you list and inspect built-in and custom
      role definitions, create or update custom roles, and assign roles to users,
      groups, or service principals at tenant-wide or resource-scoped levels.
  - aid: microsoft-graph:microsoft-graph-schema-extensions
    name: Microsoft Graph Schema Extensions
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://graph.microsoft.com/v1.0
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/schemaextension?view=graph-rest-1.0
    properties:
      - url: https://learn.microsoft.com/en-us/graph/api/resources/schemaextension?view=graph-rest-1.0
        type: Documentation
      - url: openapi/schemaextensions-openapi-original.yml
        type: OpenAPI
    description: >-
      Microsoft Graph schema extensions let you add your own strongly typed fields
      to Microsoft 365 resources—such as users, groups, messages, events, devices,
      and more—so your application’s data can live alongside Microsoft data and be
      accessed through the same Graph APIs.
  - aid: microsoft-graph:microsoft-graph-scoped-role-memberships
    name: Microsoft Graph Scoped Role Memberships
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://graph.microsoft.com/v1.0
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/scopedrolemembership?view=graph-rest-1.0
    properties:
      - url: https://learn.microsoft.com/en-us/graph/api/resources/scopedrolemembership?view=graph-rest-1.0
        type: Documentation
      - url: openapi/scopedrolememberships-openapi-original.yml
        type: OpenAPI
    description: >-
      Microsoft Graph Scoped Role Memberships let you programmatically assign and
      manage Azure AD (Microsoft Entra ID) directory roles with a limited scope to
      an administrative unit, rather than tenant-wide. Exposed through the scopedRoleMembership
      resource, these assignments delegate administrative permissions (for example,
      User Administrator or Helpdesk Administrator) so that the assignee’s authority
      applies only to the users, groups, or other objects contained in a specific
      administrative unit.
  - aid: microsoft-graph:microsoft-graph-search
    name: Microsoft Graph Search
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://graph.microsoft.com/v1.0
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/search-api-overview?view=graph-rest-1.0
