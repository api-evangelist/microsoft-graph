        type: Documentation
      - url: openapi/policies-openapi-original.yml
        type: OpenAPI
    description: >-
      Microsoft Graph Policies is the set of Microsoft Graph API endpoints that let
      administrators and developers read and manage tenant-wide policy settings across
      Microsoft Entra ID and Microsoft 365.
  - aid: microsoft-graph:microsoft-graph-print
    name: Microsoft Graph Print
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://graph.microsoft.com/v1.0
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/print?view=graph-rest-1.0
