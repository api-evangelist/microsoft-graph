        type: OpenAPI
    description: >-
      Microsoft Graph Organizations exposes a tenant’s organization profile in Microsoft
      Entra ID (formerly Azure Active Directory) so apps can discover and manage directory‑level
      information through a single API.
  - aid: microsoft-graph:microsoft-graph-permission-grants
    name: Microsoft Graph Permission Grants
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
